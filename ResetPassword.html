<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily One Piece - Nouveau mot de passe</title>
<style>
body { margin:0; font-family:Inter,system-ui,sans-serif; background:radial-gradient(circle at top, rgba(37,99,235,.18), transparent 40%), linear-gradient(180deg, #0b1120 0%, #0f172a 100%); color:#f8fafc; min-height:100vh; }
.topbar { width:100%; background:rgba(17,24,39,0.95); border-bottom:1px solid rgba(255,255,255,.12); box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 0 8px rgba(37,99,235,.35); }
.topbar-inner { max-width:1100px; margin:0 auto; padding:10px 16px; display:flex; gap:12px; align-items:center; }
button,input { font:inherit; }
button { border:0; border-radius:12px; padding:10px 16px; font-weight:700; cursor:pointer; }
.ghost { background:rgba(255,255,255,.06); color:#f8fafc; border:1px solid rgba(255,255,255,.08); }
.primary { background:#2563eb; color:#fff; }
.topbar-actions { margin-left:auto; display:flex; gap:12px; align-items:center; }
.container { max-width:760px; margin:40px auto; padding:0 16px 48px; }
.card { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:24px; box-shadow:0 12px 30px rgba(0,0,0,.18); }
.field { display:grid; gap:8px; margin:18px 0 12px; }
label { color:rgba(248,250,252,.72); font-size:14px; }
input { width:100%; padding:11px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.06); color:#f8fafc; }
.muted { color:rgba(248,250,252,.72); }
.status { min-height:20px; margin-top:12px; color:rgba(248,250,252,.72); font-size:14px; white-space:pre-line; }

/* MOBILE OPTIMIZATION */
@media (max-width: 768px) {
  .topbar-inner {
    flex-wrap: wrap;
    justify-content: center;
  }
  .topbar-actions {
    width: 100%;
    justify-content: center;
    margin-left: 0 !important;
  }
  .container, .card, .panel, .controls, .stat-card {
    width: min(100% - 20px, 1100px) !important;
    margin-left: auto !important;
    margin-right: auto !important;
  }
  input, button {
    font-size: 16px !important;
  }
  table {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }
}

</style>
</head>
<body>
<div class="topbar"><div class="topbar-inner"><button class="ghost" id="homeBtn">Accueil</button><div class="topbar-actions"><button class="ghost" id="langToggle">FR</button></div></div></div>
<div class="container">
  <div class="card">
    <h1 id="title">Définir un nouveau mot de passe</h1>
    <p class="muted" id="subtitle">Choisis un nouveau mot de passe pour ton compte.</p>
    <div class="field"><label id="passwordLabel" for="passwordInput">Nouveau mot de passe</label><input id="passwordInput" type="password" /></div>
    <div class="field"><label id="confirmLabel" for="confirmInput">Confirmer le mot de passe</label><input id="confirmInput" type="password" /></div>
    <button class="primary" id="saveBtn">Enregistrer</button>
    <div class="status" id="status"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  const DOP = {
    getLang() { const urlLang = new URLSearchParams(window.location.search).get('lang'); return urlLang || localStorage.getItem('dop_lang') || 'fr'; },
    setLang(lang) { localStorage.setItem('dop_lang', lang); },
    getCurrentUser() { try { return JSON.parse(localStorage.getItem('dop_user') || 'null'); } catch { return null; } },
    withLang(page, lang) { return `${page}?lang=${encodeURIComponent(lang || this.getLang())}`; },
    updateTopbarLabels(translations) {
      const lang = this.getLang(); const t = translations[lang] || translations.fr; const user = this.getCurrentUser();
      homeBtn.textContent = t.home; leaderboardBtn.textContent = t.leaderboard; loginBtn.textContent = user ? t.account : t.login; langToggle.textContent = t.lang;
      homeBtn.onclick = () => window.location.href = this.withLang('Homepage.html', lang);
      leaderboardBtn.onclick = () => window.location.href = this.withLang('Leaderboard.html', lang);
      loginBtn.onclick = () => window.location.href = this.withLang(user ? 'Account.html' : 'Login.html', lang);
      langToggle.onclick = () => { const next = lang === 'fr' ? 'en' : 'fr'; this.setLang(next); window.location.href = this.withLang('ResetPassword.html', next); };
    }
  };
  window.DOP = DOP;
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const translations = {
    fr: { lang:'FR', home:'Accueil', leaderboard:'Classement', login:'Connexion', account:'Mon compte', title:'Définir un nouveau mot de passe', subtitle:'Choisis un nouveau mot de passe pour ton compte.', password:'Nouveau mot de passe', confirm:'Confirmer le mot de passe', save:'Enregistrer', mismatch:'Les mots de passe ne correspondent pas.', empty:'Merci de remplir les deux champs.', saved:'Mot de passe mis à jour. Tu peux maintenant te connecter.', missingConfig:'Configuration Supabase introuvable.', noRecovery:'Lien invalide ou expiré. Recommence la procédure.', htmlLang:'fr' },
    en: { lang:'EN', home:'Home', leaderboard:'Leaderboard', login:'Login', account:'My account', title:'Set a new password', subtitle:'Choose a new password for your account.', password:'New password', confirm:'Confirm password', save:'Save', mismatch:'Passwords do not match.', empty:'Please fill in both fields.', saved:'Password updated. You can now log in.', missingConfig:'Supabase configuration not found.', noRecovery:'Invalid or expired link. Please start again.', htmlLang:'en' }
  };
  const lang = window.DOP.getLang();
  const t = translations[lang] || translations.fr;
  document.documentElement.lang = t.htmlLang;
  window.DOP.updateTopbarLabels(translations);
  title.textContent = t.title; subtitle.textContent = t.subtitle; passwordLabel.textContent = t.password; confirmLabel.textContent = t.confirm; saveBtn.textContent = t.save; passwordInput.placeholder = t.password; confirmInput.placeholder = t.confirm;

  try {
    const configResponse = await fetch('/api/public-config');
    const publicConfig = await configResponse.json();
    if (!publicConfig.supabaseUrl || !publicConfig.supabaseAnonKey) throw new Error(t.missingConfig);
    const supabase = window.supabase.createClient(publicConfig.supabaseUrl, publicConfig.supabaseAnonKey);

    async function hasRecoverySession() {
      const { data } = await supabase.auth.getSession();
      return !!data.session;
    }

    saveBtn.onclick = async () => {
      status.textContent = '';
      const password = passwordInput.value;
      const confirm = confirmInput.value;
      if (!password || !confirm) return status.textContent = t.empty;
      if (password !== confirm) return status.textContent = t.mismatch;

      const ok = await hasRecoverySession();
      if (!ok) return status.textContent = t.noRecovery;

      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        status.textContent = error.message;
        return;
      }
      status.textContent = t.saved;
      setTimeout(() => { window.location.href = window.DOP.withLang('Login.html', lang); }, 900);
    };
  } catch (error) {
    status.textContent = error.message || t.missingConfig;
  }
});
</script>
  <script src="./site_footer_cookies.js"></script>
  <script src="./session_nav.js"></script>
</body></html>
