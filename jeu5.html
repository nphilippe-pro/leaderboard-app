<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Piece Guess</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #f59e0b;
      --border: rgba(255,255,255,.08);
      --shadow: 0 12px 32px rgba(0,0,0,.28);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(37,99,235,.18), transparent 40%),
        linear-gradient(180deg, #0b1120 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    .hero {
      position: relative;
      z-index: 5000;
      display: flex;
      gap: 18px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .panel {
      position: relative;
      z-index: 1;
      overflow: visible;
      background: rgba(17,24,39,.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .controls {
      position: relative;
      z-index: 5001;
      padding: 18px;
      overflow: visible;
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }
    .controls-row {
      position: relative;
      z-index: 2000;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .input-wrap {
      display: grid;
      gap: 8px;
      flex: 1;
      min-width: 280px;
    }
    label {
      font-weight: 600;
      font-size: .95rem;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
      background: #0b1220;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    input:focus {
      border-color: rgba(59,130,246,.8);
      box-shadow: 0 0 0 3px rgba(59,130,246,.18);
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .primary { background: #2563eb; color: white; }
    .secondary { background: #374151; color: white; }
    .ghost {
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .stats {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .stat-card {
      padding: 14px 16px;
      min-width: 150px;
    }
    .stat-label { color: var(--muted); font-size: .85rem; }
    .stat-value { font-size: 1.4rem; font-weight: 800; margin-top: 4px; }
    .message {
      padding: 14px 16px;
      margin-bottom: 16px;
      border-radius: 14px;
      display: none;
      font-weight: 600;
    }
    .message.show { display: block; }
    .message.success { background: rgba(22,163,74,.16); border: 1px solid rgba(22,163,74,.35); color: #bbf7d0; }
    .message.info { background: rgba(37,99,235,.16); border: 1px solid rgba(37,99,235,.35); color: #bfdbfe; }
    .table-wrap {
      position: relative;
      z-index: 1;
      overflow-x: auto;
      padding: 8px;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 8px;
      min-width: 980px;
    }
    th {
      color: var(--muted);
      font-size: .82rem;
      letter-spacing: .02em;
      text-transform: uppercase;
      padding: 6px 10px;
      text-align: center;
    }
    td {
      padding: 14px 12px;
      border-radius: 14px;
      text-align: center;
      font-weight: 700;
      background: var(--panel-2);
      border: 1px solid var(--border);
      white-space: normal;
    }
    td.correct {
      background: rgba(22,163,74,.95);
      color: white;
      border-color: rgba(255,255,255,.18);
    }
    td.incorrect {
      background: rgba(220,38,38,.92);
      color: white;
      border-color: rgba(255,255,255,.12);
    }
    .cell-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .arrow {
      font-size: 1.05rem;
      line-height: 1;
      font-weight: 900;
    }
    .legend {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .92rem;
      padding: 0 8px 4px;
    }
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .footer-note {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.5;
    }

    
    .search-wrap {
      position: relative;
      z-index: 6000;
      isolation: isolate;
    }
    .search-box {
      position: relative;
      z-index: 7000;
      isolation: isolate;
    }
    .suggestions-box {
      position: absolute;
      isolation: isolate;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      pointer-events: auto;
      z-index: 999999;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
      max-height: 360px;
      overflow-y: auto;
      padding: 8px;
    }
    .suggestions-hint {
      display: none;
    }
    .suggestions-list {
      display: grid;
      gap: 4px;
    }
    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 600;
    }
    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(37,99,235,.18);
      transform: none;
    }
    .suggestion-item img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255,255,255,.05);
      flex-shrink: 0;
    }
    .suggestion-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .suggestions-empty {
      padding: 14px 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }


    .result-thumb {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: cover;
      display: block;
      margin: 0 auto;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
    }
    .result-thumb-fallback {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      font-weight: 800;
      color: white;
      background: rgba(37,99,235,.28);
      border: 1px solid rgba(255,255,255,.08);
      margin: 0 auto;
    }


    th:first-child {
      width: 84px;
    }

    
.win-popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999999;
  cursor: pointer;
  padding: 24px;
}
.win-popup[hidden] {
  display: none !important;
}
.win-popup img {
  max-width: min(92vw, 720px);
  max-height: 92vh;
  width: auto;
  height: auto;
  border-radius: 16px;
  display: block;
}


.title-image {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0 0 6px;
}
.title-image img {
  max-width: 100%;
  height: auto;
}


    .title-image {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0 0 6px;
}
    .title-image img {
      display: block;
      max-width: min(100%, 680px);
      width: 100%;
      height: auto;
    }


    .subtitle-image {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0 0 6px;
}
    .subtitle-image img {
      display: block;
      width: 50%;
      max-width: 360px;
      height: auto;
    }


    


    .topbar {
      width: 100%;
      background: rgba(17,24,39,0.95);
      border-bottom: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 1px 0 rgba(255,255,255,.05) inset, 0 0 8px rgba(37,99,235,.35);
    }
    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 16px;
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: space-between;
      align-items: center;
    }
    .topbar-inner #langToggle {
      margin-left: auto;
    }
    
    .topbar-spacer {
      flex: 1;
    }
    .hero {
      margin-top: 10px;
    }

@media (max-width: 720px) {
    .subtitle-image img { width: 90%; max-width: none; }

      .container { width: min(100% - 20px, 1120px); padding-top: 20px; }
      .controls, .stat-card { border-radius: 16px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <button class="ghost" id="homeBtn">Accueil</button>
      
      <div style="margin-left:auto; display:flex; gap:10px;">
        
        <button class="ghost" id="langToggle">FR</button>
    </div>
  </div>
  </div>

  <div class="container">
    <div class="hero">
      <div>
        <div id="title" class="title-image"><img src="./Images/./titre1.png" alt="One Piece Guess" /></div>
        <div id="subtitle" class="subtitle-image"><img id="subtitleImg" src="./Images/jeu5_FR.png" alt="Description" /></div>
      </div>
      <div class="toolbar">
        
        
      </div>
    </div>

    <div class="panel controls">
      <div class="controls-row">
        <div class="input-wrap search-wrap">
          <label for="guessInput" id="guessLabel">Choisir un personnage</label>
          <div class="search-box">
            <input id="guessInput" autocomplete="off" placeholder="Ex. Luffy" aria-autocomplete="list" aria-expanded="false" aria-controls="suggestionsList" />
            <div id="suggestionsBox" class="suggestions-box" hidden>
              <div id="suggestionsHint" class="suggestions-hint"></div>
              <div id="suggestionsList" class="suggestions-list" role="listbox" aria-label="Suggestions de personnages"></div>
            </div>
          </div>
        </div>
        <button class="primary" id="guessBtn">Valider</button>
      </div>
    </div>

    <div class="stats" style="position:relative; z-index:1;">
      <div class="panel stat-card">
        <div class="stat-label" id="triesLabel">Essais</div>
        <div class="stat-value" id="triesValue">0</div>
      </div>
      <div class="panel stat-card">
        <div class="stat-label" id="statusLabel">Statut</div>
        <div class="stat-value" id="statusValue">En cours</div>
      </div>
      <div class="panel stat-card">
        <div class="stat-label" id="dayLabel">Jour</div>
        <div class="stat-value" id="dayValue">-</div>
      </div>
    </div>

    <div id="messageBox" class="message info"></div>

    <div class="legend" style="position:relative; z-index:1;">
      <span><i class="legend-dot dot-green"></i> <span id="legendCorrect">Correct</span></span>
      <span><i class="legend-dot dot-red"></i> <span id="legendIncorrect">Incorrect</span></span>
      <span id="legendPrime">Prime : ↑ plus élevée, ↓ plus faible</span>
      <span id="legendArc">Première apparition : ↑ plus tard, ↓ plus tôt</span>
    </div>

    <div class="panel table-wrap" style="position:relative; z-index:1;">
      <table>
        <thead>
          <tr id="tableHeadRow"></tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <p class="footer-note" id="footerNote">
      Le personnage du jour est déterminé à partir de la date du jour (fuseau Europe/Paris) et reste identique pour tous les joueurs ce jour-là.
    </p>
  </div>


  <div id="winPopup" class="win-popup" hidden>
    <img id="winPopupImg" src="" alt="Bravo" />
  </div>

        function getInitialLang() {
      const params = new URLSearchParams(window.location.search);
      const queryLang = params.get("lang");
      const savedLang = localStorage.getItem("dop_lang");
      const legacyLang = localStorage.getItem("op_guess_lang");
      const lang = queryLang || savedLang || legacyLang || "fr";
      return lang === "en" ? "en" : "fr";
    }

    const state = {
      isLoggedIn: false,
      lang: getInitialLang(),
      guesses: [],
      won: false,
      filteredSuggestions: [],
      activeSuggestionIndex: -1,
      pointsSubmitted: false,
      sessionRecorded: false,
      accessChecked: false,
    };

    function getParisDayKey() {
      const formatter = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Europe/Paris",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
      return formatter.format(new Date());
    }

    function getParisDisplayDate() {
      const formatter = new Intl.DateTimeFormat("fr-FR", {
        timeZone: "Europe/Paris",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
      return formatter.format(new Date());
    }

    const GAME_SLOT = 0;
    const GAME_KEY = "jeu5";

    function createSeededRandom(seedString) {
      let seed = 0;
      for (let i = 0; i < seedString.length; i++) {
        seed = (seed * 31 + seedString.charCodeAt(i)) >>> 0;
      }

      return function seededRandom() {
        seed = (seed * 1664525 + 1013904223) >>> 0;
        return seed / 4294967296;
      };
    }

    function getDailyCharacters(dayKey, count = 4) {
      const shuffledCharacters = [...characters];
      const random = createSeededRandom(dayKey);

      for (let i = shuffledCharacters.length - 1; i > 0; i--) {
        const j = Math.floor(random() * (i + 1));
        [shuffledCharacters[i], shuffledCharacters[j]] = [shuffledCharacters[j], shuffledCharacters[i]];
      }

      return shuffledCharacters.slice(0, Math.min(count, shuffledCharacters.length));
    }

    function getDailyCharacter(dayKey) {
      const dailyCharacters = getDailyCharacters(dayKey, 4);
      return dailyCharacters[GAME_SLOT] || dailyCharacters[0] || characters[0];
    }

    function getStorageKey() {
      return `onepiece_guess__${GAME_KEY}__${getParisDayKey()}`;
    }

    function parseBounty(value) {
      if (value === null || value === undefined || value === "") return null;
      if (typeof value === "number") return value;
      const cleaned = String(value).replace(/[^\d-]/g, "");
      if (!cleaned) return null;
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : null;
    }

    function compareExact(guessValue, targetValue) {
      return String(guessValue ?? "").trim().toLowerCase() === String(targetValue ?? "").trim().toLowerCase();
    }

    function compareBounty(guessValue, targetValue) {
      if (compareExact(guessValue, targetValue)) {
        return { isCorrect: true, arrow: "" };
      }
      const guessNum = parseBounty(guessValue);
      const targetNum = parseBounty(targetValue);
      if (guessNum === null || targetNum === null) {
        return { isCorrect: false, arrow: "" };
      }
      return {
        isCorrect: false,
        arrow: targetNum > guessNum ? "↑" : "↓"
      };
    }

    function compareAppearance(guessValue, targetValue, lang) {
      if (compareExact(guessValue, targetValue)) {
        return { isCorrect: true, arrow: "" };
      }
      const order = lang === "fr" ? arcsOrderFR : arcsOrderEN;
      const guessIndex = order.findIndex(item => item.toLowerCase() === String(guessValue ?? "").trim().toLowerCase());
      const targetIndex = order.findIndex(item => item.toLowerCase() === String(targetValue ?? "").trim().toLowerCase());
      if (guessIndex === -1 || targetIndex === -1) {
        return { isCorrect: false, arrow: "" };
      }
      return {
        isCorrect: false,
        arrow: targetIndex > guessIndex ? "↑" : "↓"
      };
    }

    function getColumns(lang) {
      if (lang === "fr") {
        return [
          { key: "Image", label: "", type: "image" },
          { key: "Personnage_FR", label: "Nom", type: "exact" },
          { key: "Sexe_FR", label: "Sexe", type: "exact" },
          { key: "Affiliation_FR", label: "Affiliation", type: "exact" },
          { key: "Prime_FR", label: "Prime", type: "bounty" },
          { key: "Fruit-du-demon_FR", label: "Fruit du démon", type: "exact" },
          { key: "Premiere-apparition_FR", label: "Première apparition", type: "appearance" },
        ];
      }
      return [
        { key: "Image", label: "", type: "image" },
        { key: "Personnage_EN", label: "Name", type: "exact" },
        { key: "Sexe_EN", label: "Gender", type: "exact" },
        { key: "Affiliation_EN", label: "Affiliation", type: "exact" },
        { key: "Prime_EN", label: "Bounty", type: "bounty" },
        { key: "Fruit-du-demon_EN", label: "Devil Fruit", type: "exact" },
        { key: "Premiere-apparition_EN", label: "First appearance", type: "appearance" },
      ];
    }

    function getCharacterName(char) {
      return state.lang === "fr" ? char.Personnage_FR : char.Personnage_EN;
    }

    function normalize(str) {
      return String(str ?? "").trim().toLowerCase();
    }

    function findCharacterByInput(input) {
      const query = normalize(input);
      const key = state.lang === "fr" ? "Personnage_FR" : "Personnage_EN";
      return characters.find(c => normalize(c[key]) === query);
    }

    function showMessage(text, type = "info") {
      els.messageBox.textContent = text;
      els.messageBox.className = `message show ${type}`;
    }

    function hideMessage() {
      els.messageBox.className = "message";
      els.messageBox.textContent = "";
    }

    function buildHead() {
      const cols = getColumns(state.lang);
      els.tableHeadRow.innerHTML = cols.map(col => `<th>${col.label}</th>`).join("");
    }

    function getSuggestionEntries() {
      const key = state.lang === "fr" ? "Personnage_FR" : "Personnage_EN";
      const guessedIds = new Set(
        state.guesses
          .filter(Boolean)
          .map(c => c && c.ID !== undefined && c.ID !== null ? String(c.ID) : null)
          .filter(Boolean)
      );

      return characters
        .filter(c => c && c[key])
        .filter(c => !guessedIds.has(String(c.ID)))
        .map(c => ({
          name: c[key],
          image: c.Image || ""
        }))
        .sort((a, b) => a.name.localeCompare(b.name, state.lang === "fr" ? "fr" : "en"));
    }

    function getImageSrc(image) {
      if (!image) return FALLBACK_IMAGE;
      const isAbsolute = /^https?:\/\//i.test(image) || image.startsWith("data:") || image.startsWith("/") || image.startsWith("./") || image.startsWith("../");
      return isAbsolute ? image : IMAGE_BASE_PATH + image;
    }

    function closeSuggestions() {
      state.activeSuggestionIndex = -1;
      els.suggestionsBox.hidden = true;
      els.guessInput.setAttribute("aria-expanded", "false");
    }

    function openSuggestions() {
      els.suggestionsBox.hidden = false;
      els.guessInput.setAttribute("aria-expanded", "true");
    }

    function selectSuggestion(name, shouldSubmit = false) {
      const safeName = typeof name === "string" ? name : (name && name.name ? name.name : "");
      els.guessInput.value = safeName;
      closeSuggestions();
      if (shouldSubmit) {
        submitGuess();
        return;
      }
      els.guessInput.focus();
    }

    function renderSuggestions(query = els.guessInput.value.trim()) {
      const allEntries = getSuggestionEntries();
      const normalizedQuery = normalize(query);

      const matches = normalizedQuery
        ? [
            ...allEntries.filter(entry => normalize(entry.name).startsWith(normalizedQuery)),
            ...allEntries.filter(entry => {
              const normalizedName = normalize(entry.name);
              return !normalizedName.startsWith(normalizedQuery) && normalizedName.includes(normalizedQuery);
            })
          ]
        : allEntries.slice(0, 12);

      state.filteredSuggestions = matches.slice(0, 12);
      state.activeSuggestionIndex = -1;

      if (!state.filteredSuggestions.length) {
        els.suggestionsList.innerHTML = `<div class="suggestions-empty">${state.lang === "fr" ? "Aucun personnage trouvé." : "No character found."}</div>`;
        openSuggestions();
        return;
      }

      els.suggestionsList.innerHTML = state.filteredSuggestions.map((entry, index) => `
        <button type="button" class="suggestion-item" data-index="${index}" data-name="${escapeHtml(entry.name)}" role="option" aria-selected="false">
          <img src="${getImageSrc(entry.image)}" alt="" onerror="this.onerror=null;this.src=window.FALLBACK_IMAGE;" />
          <span class="suggestion-name">${escapeHtml(entry.name)}</span>
        </button>
      `).join("");

      openSuggestions();
      window.FALLBACK_IMAGE = FALLBACK_IMAGE;
    }

    function moveSuggestionSelection(direction) {
      if (!state.filteredSuggestions.length) return;
      const max = state.filteredSuggestions.length - 1;
      state.activeSuggestionIndex = direction > 0
        ? Math.min(state.activeSuggestionIndex + 1, max)
        : Math.max(state.activeSuggestionIndex - 1, 0);

      [...els.suggestionsList.querySelectorAll(".suggestion-item")].forEach((btn, index) => {
        const active = index === state.activeSuggestionIndex;
        btn.classList.toggle("active", active);
        btn.setAttribute("aria-selected", active ? "true" : "false");
        if (active) btn.scrollIntoView({ block: "nearest" });
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function saveState() {
      const payload = {
        lang: state.lang,
        guesses: state.guesses.map(c => c.ID),
        won: state.won,
        pointsSubmitted: state.pointsSubmitted,
        sessionRecorded: state.sessionRecorded,
      };
      localStorage.setItem(getStorageKey(), JSON.stringify(payload));
      localStorage.setItem("op_guess_lang", state.lang);
      localStorage.setItem("dop_lang", state.lang);
    }

    function loadState() {
      const raw = localStorage.getItem(getStorageKey());
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        state.won = Boolean(data.won);
        state.pointsSubmitted = Boolean(data.pointsSubmitted);
        state.sessionRecorded = Boolean(data.sessionRecorded);
        if (Array.isArray(data.guesses)) {
          state.guesses = data.guesses
            .map(id => characters.find(c => c.ID === id))
            .filter(Boolean);
        }
      } catch (e) {
        console.warn("Unable to load local state", e);
      }
    }

    function renderStats() {
      const copy = ui[state.lang];
      els.triesValue.textContent = state.guesses.length;

    function getCharacterImageSrc(image) {
      if (!image) return "";
      const isAbsolute = /^https?:\/\//i.test(image) || image.startsWith("data:") || image.startsWith("/") || image.startsWith("./") || image.startsWith("../");
      return isAbsolute ? image : IMAGE_BASE_PATH + image;
    }

    function getCharacterImageCell(character, displayName) {
      const initial = escapeHtml((displayName || "?").charAt(0).toUpperCase());
      const src = getCharacterImageSrc(character && character.Image ? character.Image : "");
      if (!src) {
        return `<span class="result-thumb-fallback" aria-hidden="true">${initial}</span>`;
      }
      return `<img class="result-thumb" src="${escapeHtml(src)}" alt="${escapeHtml(displayName || "")}" loading="lazy" onerror="this.outerHTML='&lt;span class=&quot;result-thumb-fallback&quot; aria-hidden=&quot;true&quot;&gt;${initial}&lt;/span&gt;';" />`;
    }

    function formatCellValue(value, type, key) {
      if (type === "bounty") {
        if (value === "Inconnue" || value === "Unknown") return value;
        if (typeof value === "number") return value.toLocaleString("fr-FR");
      }
      if (key === "Affiliation_EN" && value === "None") return "None";
      if (key === "Affiliation_EN" && value === "") return "None";
      if (key === "Fruit-du-demon_EN" && value === "None") return "None";
      if (key === "Fruit-du-demon_EN" && value === "") return "None";
      if (value === null || value === undefined || value === "") return "—";
      return String(value);
    }

    function renderRows() {
      const dailyCharacter = getDailyCharacter(getParisDayKey());
      const cols = getColumns(state.lang);

      els.resultsBody.innerHTML = state.guesses.map(guess => {
        const cells = cols.map(col => {
          const guessValue = guess[col.key] ?? "";
          const targetValue = dailyCharacter[col.key] ?? "";
          let result;

          if (col.type === "bounty") {
            result = compareBounty(guessValue, targetValue);
          } else if (col.type === "appearance") {
            result = compareAppearance(guessValue, targetValue, state.lang);
          } else {
            result = { isCorrect: compareExact(guessValue, targetValue), arrow: "" };
          }

          if (col.type === "image") {
            const displayName = getCharacterName(guess);
            return `
              <td>
                <span class="cell-content">
                  ${getCharacterImageCell(guess, displayName)}
                </span>
              </td>
            `;
          }

          const klass = result.isCorrect ? "correct" : "incorrect";
          const displayValue = formatCellValue(guessValue, col.type, col.key);
          return `
            <td class="${klass}">
              <span class="cell-content">
                <span>${escapeHtml(displayValue)}</span>
                ${result.arrow ? `<span class="arrow">${result.arrow}</span>` : ""}
              </span>
            </td>
          `;
        }).join("");

        return `<tr>${cells}</tr>`;
      }).join("");
    }

    


    async function checkAccessForCurrentGame() {
      if (state.accessChecked) return true;
      if (!window.GameSessionManager) return true;

      try {
        const result = await window.GameSessionManager.canPlayGame("jeu5");
        if (!result.allowed) {
          if (result.reason === "not_logged_in") {
            alert(state.lang === "fr" ? "Tu dois être connecté pour jouer." : "You must be logged in to play.");
          } else {
            alert(state.lang === "fr" ? "Tu as déjà atteint la limite du jour ou choisi l'autre mode." : "You already reached today's limit or selected the other mode.");
          }
          window.location.href = state.lang === "fr" ? "Homepage.html?lang=fr" : "Homepage.html?lang=en";
          return false;
        }
        state.accessChecked = true;
        return true;
      } catch (error) {
        console.error("Access check failed", error);
        alert(state.lang === "fr" ? "Erreur lors de la vérification d'accès." : "Error while checking access.");
        window.location.href = state.lang === "fr" ? "Homepage.html?lang=fr" : "Homepage.html?lang=en";
        return false;
      }
    }

    async function recordCurrentGameSession() {
      if (state.sessionRecorded) return null;
      if (!window.GameSessionManager) return null;

      try {
        const result = await window.GameSessionManager.recordGameSession("jeu5", state.guesses.length);
        if (result && result.ok) {
          state.sessionRecorded = true;
          saveState();
        }
        return result;
      } catch (error) {
        console.error("Game session save failed", error);
        return { ok:false, error:error.message || "Save failed" };
      }
    }

      try {

        state.pointsSubmitted = true;
        saveState();

    function resetToday() {
      localStorage.removeItem(getStorageKey());
      state.guesses = [];

      els.guessInput.value = "";

      hideMessage();
      renderTexts();
      showMessage(ui[state.lang].restart, "info");

    async function submitGuess() {
      hideMessage();

      if (state.won) return;

      const input = els.guessInput.value.trim();
      if (!input) {
        showMessage(ui[state.lang].emptyInput, "info");
        return;
      }

      const found = findCharacterByInput(input);
      if (!found) {
        showMessage(ui[state.lang].unknownCharacter, "info");
        return;
      }

      if (state.guesses.some(g => g.ID === found.ID)) {
        showMessage(ui[state.lang].duplicate, "info");
        return;
      }

      state.guesses.unshift(found);
      saveState();
      renderStats();
      renderRows();

      const dailyCharacter = getDailyCharacter(getParisDayKey());
      const nameKey = state.lang === "fr" ? "Personnage_FR" : "Personnage_EN";
      if (compareExact(found[nameKey], dailyCharacter[nameKey])) {
        state.won = true;
        showWinPopup();

        let successMessage = ui[state.lang].success;
        const sessionResult = await recordCurrentGameSession();
        const scoreResult = await awardPointsForCurrentGame();

        if (sessionResult && sessionResult.ok) {
          successMessage += state.lang === "fr"
            ? ` (+${sessionResult.points} points)`
            : ` (+${sessionResult.points} points)`;
        } else if (sessionResult && sessionResult.reason === "insert_error") {
          successMessage += state.lang === "fr"
            ? " (partie déjà comptabilisée aujourd'hui)"
            : " (game already counted today)";
        } else if (sessionResult && sessionResult.error) {
          successMessage += state.lang === "fr"
            ? " (erreur d'enregistrement de la partie)"
            : " (game save error)";
        }

        if (scoreResult && !scoreResult.skipped) {
          if (scoreResult.alreadyPlayed) {
            successMessage += state.lang === "fr"
              ? " (score déjà comptabilisé aujourd'hui)"
              : " (score already counted today)";
          } else if (scoreResult.error) {
            successMessage += state.lang === "fr"
              ? " (erreur d'enregistrement du score)"
              : " (score save error)";
          }
        }

        showMessage(successMessage, "success");
      }

      els.guessInput.value = "";
      closeSuggestions();
      saveState();
      renderTexts();
    }

    els.guessBtn.addEventListener("click", submitGuess);

    els.guessInput.addEventListener("input", () => {
      renderSuggestions();
    });

    els.guessInput.addEventListener("focus", () => {
      renderSuggestions();
    });

    els.guessInput.addEventListener("keydown", (event) => {
      if (event.key === "ArrowDown") {
        event.preventDefault();
        if (els.suggestionsBox.hidden) {
          renderSuggestions();
        } else {
          moveSuggestionSelection(1);
        }
        return;
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        moveSuggestionSelection(-1);
        return;
      }

      if (event.key === "Escape") {
        closeSuggestions();
        return;
      }

      if (event.key === "Enter") {
        event.preventDefault();
        if (!els.suggestionsBox.hidden && state.activeSuggestionIndex >= 0 && state.filteredSuggestions[state.activeSuggestionIndex]) {
          selectSuggestion(state.filteredSuggestions[state.activeSuggestionIndex].name, true);
          return;
        }
        submitGuess();
      }
    });

    els.suggestionsList.addEventListener("click", (event) => {
      const button = event.target.closest(".suggestion-item");
      if (!button) return;
      const index = Number(button.dataset.index);
      const entry = state.filteredSuggestions[index];
      if (!entry) return;
      selectSuggestion(entry.name, true);
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".search-box")) {
        closeSuggestions();
      }
    });

    els.langToggle.addEventListener("click", () => {
      state.lang = state.lang === "fr" ? "en" : "fr";
      saveState();
      localStorage.setItem("op_guess_lang", state.lang);
      localStorage.setItem("dop_lang", state.lang);
      const params = new URLSearchParams(window.location.search);
      params.set("lang", state.lang);
      window.location.search = params.toString();
    });
    els.newDayBtn.addEventListener("click", resetToday);

    loadState();
    checkAccessForCurrentGame().then((ok) => {
      if (ok) renderTexts();
    });
</script>



<script>
document.addEventListener('DOMContentLoaded', () => {
  const translations = {
    fr: { lang:'FR', home:'Accueil', leaderboard:'Classement', login:'Connexion', account:'Mon compte' },
    en: { lang:'EN', home:'Home', leaderboard:'Leaderboard', login:'Login', account:'My account' }
  };
  window.DOP.updateTopbarLabels(translations);
});
</script>


<script>
(function () {
  const DOP = {
    getLang() {
      const urlLang = new URLSearchParams(window.location.search).get('lang');
      return urlLang || localStorage.getItem('dop_lang') || 'fr';
    },
    setLang(lang) {
      localStorage.setItem('dop_lang', lang);
    },
    getUsers() {
      try { return JSON.parse(localStorage.getItem('dop_users') || '[]'); } catch { return []; }
    },
    saveUsers(users) {
      localStorage.setItem('dop_users', JSON.stringify(users));
    },
    getCurrentUser() {
      try { return JSON.parse(localStorage.getItem('dop_user') || 'null'); } catch { return null; }
    },
    setCurrentUser(user) {
      localStorage.setItem('dop_user', JSON.stringify(user));
    },
    clearCurrentUser() {
      localStorage.removeItem('dop_user');
    },
    updateCurrentUserFromStore() {
      const current = this.getCurrentUser();
      if (!current) return null;
      const user = this.getUsers().find(u => u.pseudo === current.pseudo);
      if (user) {
        this.setCurrentUser({ pseudo: user.pseudo, email: user.email });
        return user;
      }
      this.clearCurrentUser();
      return null;
    },
    withLang(page, lang) {
      return `${page}?lang=${encodeURIComponent(lang || this.getLang())}`;
    },
    switchPageLang(page) {
      const params = new URLSearchParams(window.location.search);
      params.set('lang', page);
      localStorage.setItem('dop_lang', page);
      window.location.search = params.toString();
    },
    updateTopbarLabels(translations) {
      const lang = this.getLang();
      const t = translations[lang] || translations.fr;
      const user = this.updateCurrentUserFromStore();

      const homeBtn = document.getElementById('homeBtn');
      const leaderboardBtn = document.getElementById('leaderboardBtn');
      const loginBtn = document.getElementById('loginBtn');
      const langToggle = document.getElementById('langToggle');

      if (homeBtn) homeBtn.textContent = t.home;
      if (leaderboardBtn) leaderboardBtn.textContent = t.leaderboard;
      if (loginBtn) loginBtn.textContent = user ? t.account : t.login;
      if (langToggle) langToggle.textContent = t.lang;

      if (homeBtn) {
        const clone = homeBtn.cloneNode(true);
        homeBtn.replaceWith(clone);
        clone.addEventListener('click', () => window.location.href = this.withLang('Homepage.html', lang));
      }
      if (leaderboardBtn) {
        const clone = leaderboardBtn.cloneNode(true);
        leaderboardBtn.replaceWith(clone);
        clone.addEventListener('click', () => window.location.href = this.withLang('Leaderboard.html', lang));
      }
      if (loginBtn) {
        const clone = loginBtn.cloneNode(true);
        loginBtn.replaceWith(clone);
        clone.addEventListener('click', () => {
          window.location.href = this.withLang(user ? 'Account.html' : 'Login.html', lang);
        });
      }
      if (langToggle) {
        const clone = langToggle.cloneNode(true);
        langToggle.replaceWith(clone);
        clone.addEventListener('click', () => {
          const next = lang === 'fr' ? 'en' : 'fr';
          this.setLang(next);
          const params = new URLSearchParams(window.location.search);
          params.set('lang', next);
          window.location.search = params.toString();
        });
      }
    }
  };
  window.DOP = DOP;
})();
</script>
