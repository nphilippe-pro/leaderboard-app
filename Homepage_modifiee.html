<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily One Piece - Classement</title>
  <style>
    :root { --bg-1:#0b1120; --bg-2:#0f172a; --panel:rgba(255,255,255,.05); --panel-2:rgba(255,255,255,.08); --text:#f8fafc; --muted:rgba(248,250,252,.72); --border:rgba(255,255,255,.08); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:radial-gradient(circle at top, rgba(37,99,235,.18), transparent 40%), linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%); color:var(--text); min-height:100vh; }
    .topbar { width:100%; background:rgba(17,24,39,0.95); border-bottom:1px solid rgba(255,255,255,.12); box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 0 8px rgba(37,99,235,.35); }
    .topbar-inner { max-width:1100px; margin:0 auto; padding:10px 16px; display:flex; gap:12px; align-items:center; }
    button,input { font:inherit; }
    button { border:0; border-radius:12px; padding:10px 16px; font-weight:700; cursor:pointer; }
    .ghost { background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--border); }
    .ghost[disabled] { opacity:.5; cursor:not-allowed; }
    .primary { background:#2563eb; color:#fff; }
    .topbar-actions { margin-left:auto; display:flex; gap:12px; align-items:center; }
    .container { max-width:1100px; margin:40px auto; padding:0 16px 48px; display:grid; gap:20px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.18); }
    .section, .card-header, .pagination, .account-box { padding:20px; }
    .card-header { border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .muted { color:var(--muted); font-size:14px; }
    .auth-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:16px; }
    .form-card { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:16px; padding:16px; }
    .field { display:grid; gap:8px; margin-bottom:12px; }
    label { font-size:14px; color:var(--muted); }
    input { width:100%; padding:11px 12px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,.06); color:var(--text); outline:none; }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:var(--panel-2); }
    th,td { padding:14px 16px; text-align:left; }
    tbody tr + tr td { border-top:1px solid var(--border); }
    .empty-state { padding:24px 16px; color:var(--muted); display:none; }
    .pagination { border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .pagination-actions { display:flex; gap:12px; }
    .account-box { display:none; border-top:1px solid var(--border); }
    .pill { display:inline-block; border-radius:999px; padding:6px 10px; background:rgba(37,99,235,.16); border:1px solid rgba(37,99,235,.3); font-size:13px; }
    .status { margin-top:8px; min-height:20px; font-size:14px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <button class="ghost" id="homeBtn">Accueil</button>
      <button class="ghost" id="leaderboardBtn">Classement</button>
      <div class="topbar-actions">
        <button class="ghost" id="loginBtn">Connexion</button>
        <button class="ghost" id="langToggle" aria-label="Changer la langue">FR</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="section">
        <div class="auth-grid">
          <div class="form-card">
            <h3 id="signupTitle" style="margin-top:0;">Créer un compte</h3>
            <div class="field"><label id="pseudoLabel" for="signupPseudo">Pseudo</label><input id="signupPseudo" minlength="3" maxlength="24" placeholder="Pseudo" /></div>
            <div class="field"><label id="emailLabel" for="signupEmail">Email</label><input id="signupEmail" type="email" placeholder="Email" /></div>
            <div class="field"><label id="passwordLabel" for="signupPassword">Mot de passe</label><input id="signupPassword" type="password" placeholder="Mot de passe" /></div>
            <button class="primary" id="signupSubmitBtn">S'inscrire</button>
            <div class="status" id="signupStatus"></div>
          </div>
          <div class="form-card">
            <h3 id="signinTitle" style="margin-top:0;">Connexion</h3>
            <div class="field"><label id="signinEmailLabel" for="signinEmail">Email</label><input id="signinEmail" type="email" placeholder="Email" /></div>
            <div class="field"><label id="signinPasswordLabel" for="signinPassword">Mot de passe</label><input id="signinPassword" type="password" placeholder="Mot de passe" /></div>
            <button class="primary" id="signinSubmitBtn">Se connecter</button>
            <div class="status" id="signinStatus"></div>
          </div>
        </div>
      </div>

      <div class="account-box" id="accountBox">
        <div class="muted" id="accountIntro">Compte connecté</div>
        <div style="margin-top:8px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
          <span class="pill" id="accountPseudoPill">Pseudo :</span>
          <span class="pill" id="accountEmailPill">Email :</span>
          <button class="ghost" id="logoutBtn">Déconnexion</button>
        </div>
        <div class="status" id="accountStatus"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <h2 id="leaderboardTitle" style="margin:0 0 6px;">Classement</h2>
          <div class="muted" id="leaderboardSubtitle">100 joueurs maximum par page. Seuls les comptes créés apparaissent.</div>
        </div>
        <div class="muted" id="playerCountLabel">0 joueur affiché</div>
      </div>

      <table>
        <thead><tr><th id="positionHeader">Position</th><th id="pseudoHeader">Pseudo</th><th id="scoreHeader">Score</th></tr></thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState"></div>
      <div class="pagination">
        <div class="muted" id="pageInfo">Page 1</div>
        <div class="pagination-actions">
          <button class="ghost" id="prevPageBtn">Précédent</button>
          <button class="ghost" id="nextPageBtn">Suivant</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const configResponse = await fetch("/api/public-config");
      const publicConfig = await configResponse.json();
      const supabase = window.supabase.createClient(publicConfig.supabaseUrl, publicConfig.supabaseAnonKey);

      const translations = {
        fr: { lang:"FR", home:"Accueil", leaderboard:"Classement", login:"Connexion", account:"Mon compte", logout:"Déconnexion", signupTitle:"Créer un compte", signinTitle:"Connexion", pseudo:"Pseudo", email:"Email", password:"Mot de passe", signupButton:"S'inscrire", signinButton:"Se connecter", accountIntro:"Compte connecté", leaderboardTitle:"Classement", leaderboardSubtitle:"100 joueurs maximum par page. Seuls les comptes créés apparaissent.", position:"Position", score:"Score", prev:"Précédent", next:"Suivant", noPlayers:"Aucun joueur à afficher.", page:"Page", displayedPlayers:(count)=>`${count} joueur${count>1?"s":""} affiché${count>1?"s":""}`, signupSuccess:"Compte créé. Vérifie ton email si une confirmation est demandée.", signinSuccess:"Connexion réussie.", logoutSuccess:"Déconnexion réussie.", accountPseudo:(pseudo)=>`Pseudo : ${pseudo}`, accountEmail:(email)=>`Email : ${email}`, invalidPseudo:"Le pseudo doit contenir 3 à 24 caractères, lettres, chiffres, _ ou -.", htmlLang:"fr" },
        en: { lang:"EN", home:"Home", leaderboard:"Leaderboard", login:"Login", account:"My account", logout:"Logout", signupTitle:"Create account", signinTitle:"Login", pseudo:"Username", email:"Email", password:"Password", signupButton:"Sign up", signinButton:"Log in", accountIntro:"Signed-in account", leaderboardTitle:"Leaderboard", leaderboardSubtitle:"Up to 100 players per page. Only registered accounts are displayed.", position:"Rank", score:"Score", prev:"Previous", next:"Next", noPlayers:"No players to display.", page:"Page", displayedPlayers:(count)=>`${count} player${count>1?"s":""} displayed`, signupSuccess:"Account created. Check your email if confirmation is required.", signinSuccess:"Signed in successfully.", logoutSuccess:"Signed out successfully.", accountPseudo:(pseudo)=>`Username: ${pseudo}`, accountEmail:(email)=>`Email: ${email}`, invalidPseudo:"Username must be 3 to 24 characters using letters, numbers, _ or -.", htmlLang:"en" }
      };

      let currentLang = "fr";
      let currentPage = 1;
      const PAGE_SIZE = 100;
      let sessionUser = null;

      const homeBtn = document.getElementById("homeBtn");
      const leaderboardBtn = document.getElementById("leaderboardBtn");
      const loginBtn = document.getElementById("loginBtn");
      const langToggle = document.getElementById("langToggle");
      const signupTitle = document.getElementById("signupTitle");
      const signinTitle = document.getElementById("signinTitle");
      const pseudoLabel = document.getElementById("pseudoLabel");
      const emailLabel = document.getElementById("emailLabel");
      const passwordLabel = document.getElementById("passwordLabel");
      const signinEmailLabel = document.getElementById("signinEmailLabel");
      const signinPasswordLabel = document.getElementById("signinPasswordLabel");
      const signupPseudo = document.getElementById("signupPseudo");
      const signupEmail = document.getElementById("signupEmail");
      const signupPassword = document.getElementById("signupPassword");
      const signinEmail = document.getElementById("signinEmail");
      const signinPassword = document.getElementById("signinPassword");
      const signupSubmitBtn = document.getElementById("signupSubmitBtn");
      const signinSubmitBtn = document.getElementById("signinSubmitBtn");
      const signupStatus = document.getElementById("signupStatus");
      const signinStatus = document.getElementById("signinStatus");
      const accountBox = document.getElementById("accountBox");
      const accountIntro = document.getElementById("accountIntro");
      const accountPseudoPill = document.getElementById("accountPseudoPill");
      const accountEmailPill = document.getElementById("accountEmailPill");
      const logoutBtn = document.getElementById("logoutBtn");
      const accountStatus = document.getElementById("accountStatus");
      const leaderboardTitle = document.getElementById("leaderboardTitle");
      const leaderboardSubtitle = document.getElementById("leaderboardSubtitle");
      const playerCountLabel = document.getElementById("playerCountLabel");
      const positionHeader = document.getElementById("positionHeader");
      const pseudoHeader = document.getElementById("pseudoHeader");
      const scoreHeader = document.getElementById("scoreHeader");
      const leaderboardBody = document.getElementById("leaderboardBody");
      const emptyState = document.getElementById("emptyState");
      const pageInfo = document.getElementById("pageInfo");
      const prevPageBtn = document.getElementById("prevPageBtn");
      const nextPageBtn = document.getElementById("nextPageBtn");

      function t() { return translations[currentLang]; }
      function isValidPseudo(value) { return /^[A-Za-z0-9_-]{3,24}$/.test(value); }

      async function fetchLeaderboard() {
        const response = await fetch(`/api/leaderboard?page=${currentPage}&pageSize=${PAGE_SIZE}`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Leaderboard error");
        return payload;
      }

      async function renderLeaderboard() {
        try {
          const payload = await fetchLeaderboard();
          const players = payload.players || [];
          const totalPages = payload.totalPages || 1;
          leaderboardBody.innerHTML = "";
          if (players.length === 0) {
            emptyState.style.display = "block";
            emptyState.textContent = t().noPlayers;
          } else {
            emptyState.style.display = "none";
            players.forEach((player) => {
              const row = document.createElement("tr");
              row.innerHTML = `<td>${player.position}</td><td>${player.pseudo}</td><td>${player.score}</td>`;
              leaderboardBody.appendChild(row);
            });
          }
          pageInfo.textContent = `${t().page} ${currentPage} / ${totalPages}`;
          playerCountLabel.textContent = t().displayedPlayers(players.length);
          prevPageBtn.disabled = currentPage <= 1;
          nextPageBtn.disabled = currentPage >= totalPages;
        } catch (error) {
          leaderboardBody.innerHTML = "";
          emptyState.style.display = "block";
          emptyState.textContent = error.message;
          prevPageBtn.disabled = true;
          nextPageBtn.disabled = true;
        }
      }

      async function loadProfile(userId) {
        const { data, error } = await supabase.from("profiles").select("pseudo, email").eq("id", userId).single();
        if (error) { accountStatus.textContent = error.message; return null; }
        return data;
      }

      async function refreshSession() {
        const { data } = await supabase.auth.getSession();
        sessionUser = data.session?.user || null;
        if (!sessionUser) {
          accountBox.style.display = "none";
          loginBtn.textContent = t().login;
          return;
        }
        loginBtn.textContent = t().account;
        accountBox.style.display = "block";
        accountIntro.textContent = t().accountIntro;
        const profile = await loadProfile(sessionUser.id);
        if (profile) {
          accountPseudoPill.textContent = t().accountPseudo(profile.pseudo);
          accountEmailPill.textContent = t().accountEmail(profile.email || sessionUser.email || "");
          accountStatus.textContent = "";
        }
      }

      function applyLanguage(lang) {
        const tr = translations[lang];
        document.documentElement.lang = tr.htmlLang;
        homeBtn.textContent = tr.home;
        leaderboardBtn.textContent = tr.leaderboard;
        loginBtn.textContent = sessionUser ? tr.account : tr.login;
        langToggle.textContent = tr.lang;
        signupTitle.textContent = tr.signupTitle;
        signinTitle.textContent = tr.signinTitle;
        pseudoLabel.textContent = tr.pseudo;
        emailLabel.textContent = tr.email;
        passwordLabel.textContent = tr.password;
        signinEmailLabel.textContent = tr.email;
        signinPasswordLabel.textContent = tr.password;
        signupPseudo.placeholder = tr.pseudo;
        signupEmail.placeholder = tr.email;
        signupPassword.placeholder = tr.password;
        signinEmail.placeholder = tr.email;
        signinPassword.placeholder = tr.password;
        signupSubmitBtn.textContent = tr.signupButton;
        signinSubmitBtn.textContent = tr.signinButton;
        logoutBtn.textContent = tr.logout;
        accountIntro.textContent = tr.accountIntro;
        leaderboardTitle.textContent = tr.leaderboardTitle;
        leaderboardSubtitle.textContent = tr.leaderboardSubtitle;
        positionHeader.textContent = tr.position;
        pseudoHeader.textContent = tr.pseudo;
        scoreHeader.textContent = tr.score;
        prevPageBtn.textContent = tr.prev;
        nextPageBtn.textContent = tr.next;
        refreshSession().then(renderLeaderboard);
      }

      signupSubmitBtn.addEventListener("click", async () => {
        signupStatus.textContent = "";
        const pseudo = signupPseudo.value.trim();
        const email = signupEmail.value.trim();
        const password = signupPassword.value;
        if (!isValidPseudo(pseudo)) {
          signupStatus.textContent = t().invalidPseudo;
          return;
        }
        const { error } = await supabase.auth.signUp({ email, password, options: { data: { pseudo } } });
        signupStatus.textContent = error ? error.message : t().signupSuccess;
        if (!error) {
          signupPseudo.value = "";
          signupEmail.value = "";
          signupPassword.value = "";
          currentPage = 1;
          await renderLeaderboard();
        }
      });

      signinSubmitBtn.addEventListener("click", async () => {
        signinStatus.textContent = "";
        const { error } = await supabase.auth.signInWithPassword({ email: signinEmail.value.trim(), password: signinPassword.value });
        signinStatus.textContent = error ? error.message : t().signinSuccess;
        if (!error) {
          signinEmail.value = "";
          signinPassword.value = "";
          await refreshSession();
          await renderLeaderboard();
        }
      });

      logoutBtn.addEventListener("click", async () => {
        const { error } = await supabase.auth.signOut();
        accountStatus.textContent = error ? error.message : t().logoutSuccess;
        await refreshSession();
      });

      langToggle.addEventListener("click", () => {
        currentLang = currentLang === "fr" ? "en" : "fr";
        applyLanguage(currentLang);
      });

      prevPageBtn.addEventListener("click", async () => {
        if (currentPage > 1) {
          currentPage -= 1;
          await renderLeaderboard();
        }
      });

      nextPageBtn.addEventListener("click", async () => {
        currentPage += 1;
        await renderLeaderboard();
      });

      supabase.auth.onAuthStateChange(async () => { await refreshSession(); });

      await refreshSession();
      applyLanguage(currentLang);
    });
  </script>
</body>
</html>
